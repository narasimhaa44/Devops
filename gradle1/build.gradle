plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.guava:guava:23.0'
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'App'
}

// Custom task
task display {
    doLast {
        println "Hello! how are you?"
    }
}
